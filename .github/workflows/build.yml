name: "Build"
on:
  workflow_dispatch:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

jobs:
  build-omp-launcher:
    name: Windows build
    runs-on: windows-latest
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
      SIGNING_TIMESTAMP_URL: http://timestamp.digicert.com
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2024-01-01 # Specific nightly version that works with dll-syringe, remove when it gets fixed so we can use latest

      - name: Install frontend dependencies
        run: yarn install

      - name: Install rust Windows target
        run: rustup target add ${{ env.WINDOWS_TARGET }}

      - name: Build project
        run: yarn release

      - name: Sign Windows binaries
        if: ${{ env.WINDOWS_CERT_BASE64 != '' && env.WINDOWS_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "openmp-launcher-signing.pfx"
          [System.IO.File]::WriteAllBytes(
            $certificatePath,
            [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          )

          $installerPath = Get-ChildItem `
            -Path "src-tauri/target/$env:WINDOWS_TARGET/release/bundle/nsis/*_x64-setup.exe" `
            | Select-Object -First 1 -ExpandProperty FullName

          if (-not $installerPath) {
            throw "Unable to locate the NSIS installer output"
          }

          $filesToSign = @(
            "src-tauri/target/$env:WINDOWS_TARGET/release/omp-launcher.exe",
            $installerPath
          )

          foreach ($file in $filesToSign) {
            & signtool sign `
              /fd SHA256 `
              /f $certificatePath `
              /p $env:WINDOWS_CERT_PASSWORD `
              /tr $env:SIGNING_TIMESTAMP_URL `
              /td SHA256 `
              $file

            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $file"
            }
          }

          Remove-Item -LiteralPath $certificatePath -Force

      - name: Generate artifact name
        id: vars
        shell: bash
        run: |
          artifact_name="open.mp-launcher-win-${GITHUB_RUN_ID}"
          echo "artifact_name=${artifact_name}" >> $GITHUB_OUTPUT
          setup_artifact_name="open.mp-launcher-win-setup-${GITHUB_RUN_ID}"
          echo "setup_artifact_name=${setup_artifact_name}" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/omp-launcher.exe
          if-no-files-found: error

      - name: Upload setup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.setup_artifact_name }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*_x64-setup.exe
          if-no-files-found: error
